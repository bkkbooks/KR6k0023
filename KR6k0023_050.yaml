body:
  text: 三藏法師義淨奉制譯學家受食學處第三爾時薄伽梵在廣嚴城於此城中有一長者名曰師子先事外道因詣佛所聽受法故獲得初果見營田業多有過失即皆棄捨於三寶所深起信心意樂淳善常樂惠施由施三寶以至貧窮時舍利子與大目連從他方來至斯住處時師子長者二俱延請明當就食諸婆羅門居士見起譏嫌作如是語師子長者歸外道時家産巨富信苾芻後頓至貧窮衣不掩身食不充口故知釋子非歸依處舍利子大目連聞是語已便往白佛佛言汝諸苾芻應可為彼師子長者作學家白二羯磨更有餘類亦應為秉如常集僧應令一人作白羯磨應如是作大德僧伽聽此師子長者信心殷重意樂淳善隨其所有悉皆惠施於三寶所曾無吝心諸有求人亦皆給與由是衣食悉皆罄盡若其僧伽時至聽者僧伽應許僧伽今許與師子長者作學家羯磨白如是羯磨準白應作若苾芻知僧伽作學家羯磨已不應往彼受其飲食床座臥具及為説法時二尊者雖曾受請知衆作法不往赴食佛言若受請者就食無犯二人便往赴請六衆見去作如是語彼初見諦亦常請我等我今合往受彼飲食既至彼已飲食不充所食之分悉皆食盡童兒啼泣諸俗譏嫌苾芻呵厭云何苾芻知彼學家衆為作法仍往彼舍受二五食世尊因此廣説乃至制其學處應如是説若復苾芻知是學家僧與作學家羯磨苾芻先不受請便詣彼家自手受取珂但尼蒲膳尼食是苾芻應還村外住處詣諸苾芻所各別告言大德我犯對説惡法是不應為今對説悔是名對説法如是世尊制學處已時師子長者婦告其夫曰因何聖者久不見來師子答曰僧伽知我家生貧乏衆作羯磨制不許來妻曰若如是者即是僧伽與我家中作覆鉢羯磨我之福業因何得生時彼長者即以其事往白佛佛言汝等苾芻從今以去向師子舍受用床座并為説法者無犯時諸苾芻往彼舍時空鉢而入空鉢而出其妻見已情生悒歎面帶憂色時諸苾芻以事白佛佛言苾芻不應空鉢而入時諸苾芻奉佛教已乞得鉢食持入其舍苾芻食時諸小男女情希殘食苾芻不與遂便啼泣以事白佛佛言應與苾芻以全餅果與之男女得已便持出外諸外道見問曰汝於何處得好餅果報言聖者與我外道曰師子受分回與野干以瓶注瓶更相供給苾芻聞已白佛佛言不應與全餅果可碎而與家人有持葉與苾芻藉鉢苾芻不受佛言應受時廣嚴城栗㚲毗等見長者家財食罄乏遂遣傭人助力耕墾昔時所廢之地地既停久沃壤異常所費不多成實數倍未久之間衣食豐贍倍勝於前時彼長者既見家道隆盛思仰福田往詣佛所請解羯磨佛便聽許佛教長者曰應入寺中具以其事白上座知令鳴捶集衆於上座前向衆禮拜蹲踞合掌作如是白大德僧伽聽我師子於三寶所深起信心意樂淳善常樂惠施由施三寶故以至貧窮由此僧伽哀愍我故為作羯磨令諸聖衆不入我家我今財食還復豐盈然我師子先得衆法今從大衆乞解羯磨唯願為我解羯磨法慈愍故三説如是白已禮衆而去是時大衆應令一人準所為事作白四羯磨應解既作解已諸苾芻衆如昔還往隨受供養並皆無犯若復苾芻者謂六衆也餘如上説學者謂信三寶證得見諦家謂四姓僧謂世尊弟子羯磨者謂白二法於如是家先不受請輒往受食者得罪此中犯者於如是處受二五食噉咽之時同前得罪其説悔法如上若得解法食皆無犯又無犯者廣如前説阿蘭若住處外受食學處第四佛在劫比羅伐窣覩城多根樹園於此夏安居時諸釋子知諸苾芻前安居了於八月十四日俱往佛所禮佛足已白佛言世尊明日聖衆夏了我等送食來至住處願佛及僧慈愍納受世尊默然時諸釋子知佛受已禮佛而退便於明日以好飲食滿車載去令諸使女隨從而行既至半途諸賊來劫賊帥令曰其釋迦女勿為劫奪不用其言皆奪衣服形露羞恥入草潛形時六衆苾芻怪食遲至共相謂曰我等當行乞食無宜久住行至中途見諸飲食載滿車乘即便大喚誰在此中時諸釋女在草叢內遙告之曰我被賊劫露體無衣所有飲食隨自取噉六衆報曰汝何不出答曰我現無衣如何相見報曰汝身支分我悉曾觀同汝己親何事羞恥可宜速出授我飲食諸女遂出露形授食是時六衆飽食而去時諸釋迦子隨後而來見諸女被劫即皆四散討覓賊徒執捉將來欲加苦害諸女告曰賊帥無心令劫奪我諸人遂放于時賊帥求請釋迦子曰仁等慈悲恩流普洽寧容殺此無識之輩幸能釋放存彼微生時釋迦子皆放令去遂將飲食往至寺中與苾芻食諸釋女等於六衆處不與好食釋子問曰何意行食不為平等報曰此皆食訖問曰誰當先與報言我與彼怪覆問女皆具答釋子聞已極生嫌賤時諸釋子告苾芻曰聖者何不於險路處令人告知我等備擬免被賊盜苾芻以事白佛佛言於險林處應差苾芻五法成就令其看守無愛恚怖癡善知道路先應問能以事勸喻若言能者以白二法而差遣之應令一人準所為事作白羯磨佛告諸苾芻其看守苾芻所有行法我今當説看守苾芻於寺四邊半踰膳那內悉應觀察若有怖處應可放煙或懸幡幟或於路中橫布樹葉或書字告知若無怖處應懸白幡此之行法不依行者得惡作罪若看守人飢須食者於小食時隨情食飯須伴應與時諸苾芻聞彼六衆寺外林中險怖之處令露形女授與飲食共生嫌恥具以白佛佛言廣説乃至為諸苾芻制其學處應如是説若復苾芻在阿蘭若恐怖處住先無觀察險難之人於住處外受食食者是苾芻應還住處詣諸苾芻所各別告言大德我犯對説惡法是不應為今對説悔是名對説法若復苾芻者謂是六衆阿蘭若義如捨墮中説無觀察者謂未差遣看守之人住處外者謂在寺外食有二五亦如上説此中犯者苾芻於險怖處無看守人作無看守想疑皆得本罪次二句輕後二無犯若於險處有看守人食時無犯又無犯者廣如前説衆多學法佛在婆羅痆斯仙人墮處施鹿林中時五苾芻雖復出家尚同俗服威儀容飾甚不端嚴爾時世尊作如是念過去諸佛云何教聲聞衆著衣服耶是時諸天前白佛言如淨居天所著衣服世尊即以天眼觀知如諸天所説事無差異即告苾芻曰汝從今後應同淨居天圓整著泥婆珊時六衆苾芻著衣太高淨信婆羅門等見不齊整便生譏誚作如是語此諸苾芻衣不齊整同無恥人諸苾芻聞已白佛佛言不應太高著衣應當學六衆聞已著衣太下俗復譏嫌佛言不應太下著衣如新嫁女應當學或時當前長垂猶如象鼻諸俗譏嫌佛言不應當前垂下或時腰邊細褶諸俗譏嫌佛言不應如多羅葉著衣應當學或時撮聚一角反腰邊猶如蛇頭諸俗譏嫌佛言不應反著衣猶如蛇頭應當學或時捉其上角團內腰邊猶如豆團佛言不應如是著衣猶如豆團應當學如是世尊為諸苾芻制其學處應如是説齊整著裙應當學不太高不太下不象鼻不蛇頭不多羅葉不豆團形著裙應當學佛言團整著三衣應當學時六衆苾芻著衣太高淨信婆羅門等見不齊整便生譏誚作如是語此諸苾芻衣不齊整同無恥人諸苾芻聞已白佛佛言不應太高著三衣應當學六衆聞已著衣太下諸俗譏嫌佛言不應太下著三衣如新嫁女應當學或披上衣垂前一角猶如象鼻諸俗譏嫌廣如上説如是世尊為諸苾芻制其學處應如是説齊整著三衣應當學不太高不太下好正披好正覆少語言不高視入白衣舍應當學佛在室羅伐城逝多林時六衆苾芻覆頭入白衣舍淨信婆羅門等見覆頭時作如是語同無恥人及新嫁女諸苾芻聞已白佛佛言不應覆頭入白衣舍應當學六衆苾芻偏抄衣入白衣舍乃至佛説不偏抄衣應當學六衆苾芻雙抄衣入白衣舍乃至佛説不雙抄衣入白衣舍應當學六衆苾芻叉腰入白衣舍乃至佛説不叉腰入白衣舍應當學六衆苾芻拊肩入白衣舍乃至佛説不拊肩入白衣舍應當學諸苾芻聞已白佛佛言廣説乃至為諸苾芻制其學處應如是説不覆頭不偏抄衣不雙抄衣不叉腰不拊肩入白衣舍應當學佛在逝多林時六衆苾芻蹲行入白衣舍淨信婆羅門等見蹲行時作如是語同無恥人諸苾芻聞已白佛佛言不應蹲行入白衣舍應當學乃至苾芻足指行入白衣舍乃至佛説不足指行入白衣舍應當學苾芻跳行入白衣舍乃至佛説不跳行入白衣舍應當學苾芻庂足行入白衣舍乃至佛説不庂足行入白衣舍應當學苾芻努身行入白衣舍佛言廣説乃至為諸苾芻制其學處應如是説不蹲行不足指行不跳行不庂足行不努身行入白衣舍坐應當學佛在逝多林時六衆苾芻搖身入白衣舍淨信婆羅門等見搖身時作如是語同無恥人諸苾芻聞已白佛佛言不應搖身入白衣舍應當學苾芻掉臂入白衣舍佛言不應掉臂入白衣舍應當學苾芻搖頭入白衣舍佛言不應搖頭入白衣舍應當學苾芻肩相排入白衣舍佛言不應肩相排入白衣舍應當學苾芻連手入白衣舍佛言不應連手入白衣舍應當學佛言廣説乃至為諸苾芻制其學處應如是説不搖身不掉臂不搖頭不肩排不連手入白衣舍應當學佛在逝多林時六衆苾芻在白衣舍他未請坐輒便自坐淨信婆羅門等見自輒坐作如是語同無恥人諸苾芻聞已白佛佛言廣説乃至為諸苾芻制其學處應如是説在白衣舍他未請坐不應輒坐應當學佛在室羅伐城逝多林時六衆苾芻在白衣舍不善觀察輒爾便坐淨信婆羅門等見在白衣舍不善觀察輒坐作如是語同無恥人諸苾芻聞已白佛佛言廣説乃至為諸苾芻制其學處應如是説在白衣舍不善觀察不應坐應當學爾時世尊過十二年方至劫比羅伐窣覩城於第一日在王宮中食至第二日在自宮中受其供養佛衆食時瞿卑夫人自手行食時具壽塢陀夷不善斂身令瞿卑夫人怪其非法後於異時獨至宮中夫人令坐朽床放身而坐床破倒地因致譏醜廣説乃至佛言苾芻若於俗家坐時不應放身而坐可善觀察應當學或於俗舍壘足而坐或重內外踝而坐或急斂足或長舒足或露身坐諸俗譏嫌佛言不應如是當制學處在白衣舍不壘足不重內踝不重外踝不急斂足不長舒足不露身應當學佛在江豬山時有施主請佛及僧就舍而食其行食者不善用心摋放美團苾芻於鉢不恭敬護遂多損破佛言恭敬受食應當學佛在江豬山時六衆苾芻入菩提長者舍乞食長者與食滿鉢受飯復受羹臛鉢便溢滿流落污地因生譏恥以事白佛佛言為制學處應如是説不得滿鉢受飯更安羹菜令食流溢於鉢緣邊應留屈指用意受食應當學或食未至預申其鉢如乞索人現叨餮相因生譏恥以事白佛佛言為制學處應如是説行食未至勿預申鉢應當學不安鉢在食上應當學或復食時現憍慢相猶如小兒及諸淫女佛言不應如是憍慢而食恭敬而食應當學或復食時極小入口極大入口如貧乞人佛言不應如是不極小摶不極大摶圓整而食應當學佛在室羅伐城時有施主請佛及僧就舍而食時塢波難陀苾芻與摩訶羅苾芻鄰次而坐時摩訶羅大開其口向上而望時塢波難陀便以土塊遙擲口中報云且食此物佛言不應如是預張其口若食未至不張口待應當學佛在室羅伐城時有施主請佛及僧就舍而食時六衆苾芻含食言話諸俗譏嫌沙門釋子不知慚愧與俗不殊共生譏醜以事白佛佛言不應如是含食語應當學或復至施主家見羹菜少恐不充足先請得羹以飯蓋覆更望得諸俗譏嫌佛言不應如是不得以飯覆羹菜不將羹菜覆飯更望多得應當學時有施主請苾芻食其食過甜六衆即便彈舌相告謂食大醋或復其食過醋六衆即便㗘㗱相告謂食大甜或有施主請苾芻食其食過熱六衆即便呵氣相告云食大冷呵熱方食或有施主請苾芻食其食過冷六衆即便吹氣相告云食大熱吹氣方食此等皆是倒説其事故惱施主佛言不應爾應制學處不彈舌食不㗘㗱食不呵氣食不吹氣食應當學或時六衆受請食時以手爬散飯食猶如雞鳥或云食惡共相毀訾或復以食填頰細細取食或復食時齧半留半或復舒舌舐掠脣口佛言應制學處不手散食不毀訾食不填頰食不齧半食不舒舌食應當學佛在室羅伐城時有施主先曾歸依露形外道近生信敬歸佛法僧遂請佛僧就舍而食時彼施主行諸飲食及以團薄餅蘿蔔是時六衆欲譏施主便以團作窣覩波像上置蘿蔔覆以薄餅遂相告曰此是惡趣中露形外道晡剌拏塔漸取食之蘿蔔便倒更相告曰此是露形外道作窣覩波今便崩倒施主見已息歸敬心佛言應制學處不作窣覩波形食應當學或時六衆受他請食其美好者有餘著手即便以舌重舐其手鉢亦如是或時振手或復振鉢謂以鉢水振灑餘人污彼衣服見他好衣生嫉妬故佛言如是等皆不應作應當學時有施主飯食衆僧報言聖者多有好食莫多請六衆不信便多受後見好食欲棄其比坐有一摩訶羅苾芻四顧而望于時六衆便持團置彼鉢內遂令溢滿不暇受餘佛言常看鉢食應當學時有苾芻食時鉢滿六衆傍觀共生輕慢云此摩訶羅大能噉食佛言不輕慢心觀比坐鉢中食應當學六衆苾芻以不淨手捉淨水瓶遂令諸蠅競來附近招致譏醜佛言不以污手捉淨水瓶應當學六衆苾芻在江豬山於菩提長者高樓上食以洗鉢水棄在好地施主生嫌佛言應制學處在白衣舍不棄洗鉢水除問主人應當學緣在室羅伐城時有婆羅門孩兒遇病有塢波索迦是彼知識來告之曰孩子若病宜往逝多林中從諸苾芻乞鉢中水令其洗沐必得平善時婆羅門即往求水見塢波難陀從乞鉢水塢波難陀便以殘飯內置鉢水中而授與彼彼見雜水起穢惡心作如是語我兒寧死誰能用此鄙惡之物而洗浴耶以事白佛佛言不應以此穢水持施於人若有人來乞鉢水時應淨洗鉢置清淨水誦阿利沙伽他呪之三遍授與彼人或洗或飲能除萬病阿利沙伽他者謂是佛所説頌出聖教中若讀誦時有大威力但是餘處令誦伽他者皆此類也即如河池井處洗浴飲水之時或暫於樹下偃息取涼而去或止客舍或入神堂蹈曼荼羅踐佛塔影或時己影障蔽尊容或大衆散時或入城聚落或晨朝日暮禮拜尊儀或每食罷時或灑掃塔廟諸如此事其類實繁皆須口誦伽他奉行獲福若故心違慢咸得惡作之罪但以東川法衆此先不行故因注言知聖教之有在其伽他者如有頌云世間五欲樂或復諸天樂若比愛盡樂千分不及一由集能生苦因苦復生集八聖道能超至妙涅槃處所為布施者必獲其義利若為樂故施後必得安樂佛言不得以殘食置鉢水中應當學時有苾芻安鉢地上下無襯替招致譏醜令疾損壞佛言應制學處地上無替不應安鉢應當學時有苾芻立洗鉢失手墮地打破其鉢佛言不立洗鉢應當學時有苾芻於危險崖岸置鉢佛言不應爾不於危險岸處置鉢應當學河水急流逆以鉢𢍶遂令鉢破佛言不應爾不得逆流酌水應當學六衆苾芻前人坐自己立為其説法時有敬信三寶婆羅門居士等呵止苾芻曰大師世尊於無量劫勤修苦行捨頭目髓腦國城妻子求得此法云何仁等以逋慢心人坐己立輒為陳説佛言不應爾人坐己立不為説法應當學時有病人不能久立聽法佛言若是病人坐臥高下於道非道及以車乘著靴覆頭冠花纓絡持蓋刀仗並著甲胄等若是病者隨何威儀為説無犯為制學處當如是説人坐己立不為説法除病應當學人臥己坐不為説法除病應當學人在高座己在下座不為説法除病應當學人在前行己在後行不為説法除病應當學人在道己在非道不為説法除病應當學不為覆頭者不為偏抄衣不為雙抄衣不為叉腰者不為拊肩者説法除病應當學不為乘象者不為乘馬不為乘輿不為乘車者説法除病應當學不為著屐靴鞋及履屨者説法除病應當學不為戴帽著冠及作佛頂髻者不為纏頭不為冠華者説法除病應當學不為持蓋者説法除病應當學緣在劫比羅伐窣覩塢波難陀立大小便諸俗人見共作譏嫌作如是語汝師世尊常懷慚恥云何仁等得無羞愧同彼俗流立泄不淨佛言不應爾不立大小便除病應當學時塢波難陀見有青草從彼乞用他不肯與遂服瀉藥以不淨盆夜灑草上廢他受用塢波難陀往其舍見愁憂問其故彼具答塢波難陀曰是我治汝不以草施因生譏罵佛言不應爾不得青草上棄大小便及洟唾除病應當學時塢波難陀持己故衣令浣衣人洗彼不肯洗便起瞋心於彼洗衣水中故放不淨時彼不覺以手觸水便污其手遂起譏罵佛言不應爾不得水中大小便洟唾除病應當學佛在室羅伐逝多林給孤獨園時城中施主請命佛僧就舍而食其看守人寺中守護塢波難陀為其請食故欲調弄不疾歸還從城出已至逝多林於其中間步量其地可有幾許時看寺人怪其遲晚恐日時過遂上高樹企望歸來時有俗侶見而譏笑沙門釋子升上高樹與俗不殊佛言不應爾不上過人樹時有苾芻為繫染繩不敢升樹復有虎狼難至亦不敢升因被殘害佛言不得上過人樹除為難緣應當學衆學法了七滅諍法攝頌曰現前并憶念不癡與求罪多人語自言草掩除衆諍佛告諸苾芻有七滅諍法應當修學應與現前毗奈耶當與現前毗奈耶應與憶念毗奈耶當與憶念毗奈耶應與不癡毗奈耶當與不癡毗奈耶應與求罪自性毗奈耶當與求罪自性毗奈耶應與多人語毗奈耶當與多人語毗奈耶應與自言毗奈耶當與自言毗奈耶應與草掩毗奈耶當與草掩毗奈耶若有諍事起當以七法順大師教如法如律而殄滅之忍是勤中上能得涅槃處出家惱他人不名為沙門此是毗鉢尸如來等正覺説是戒經明眼避險途能至安隱處智者於生界能遠離衆惡此是尸棄如來等正覺説是戒經不毀亦不害善護於戒經飲食知止足受用下臥具勤修增上定此是諸佛教此是毗舍浮如來等正覺説是戒經譬如蜂採花不壞色與香但取其味去苾芻入聚然此是俱留孫如來等正覺説是戒經不違逆他人不觀作不作但自觀身行若正若不正此是羯諾迦如來等正覺説是戒經勿著於定心勤修寂靜處能救者無憂常令念不失若人能惠施福增怨自息行善除衆惡惑盡至涅槃此是迦葉波如來等正覺説是戒經一切惡莫作一切善應修遍調於自心是則諸佛教護身為善哉能護語亦善護意為善哉盡護最為善苾芻護一切能解脫衆苦善護於口言亦善護於意身不作諸惡常淨三種業是則能隨順大仙所行道此是釋迦如來等正覺説是戒經毗鉢尸式棄毗舍俱留孫羯諾迦牟尼迦葉釋迦尊如是天中天無上調御者七佛皆雄猛能救護世間具足大名稱咸説此戒經諸佛及弟子咸共尊敬戒恭敬戒經故獲得無上果汝當求出離於佛教勤修降伏生死軍如象摧草舍於此法律中常為不放逸能竭煩惱海當盡苦邊際所為説戒經和合作長淨當共尊敬戒如犛牛愛尾我已説戒經衆僧長淨竟福利諸有情皆共成佛道
