  - {type: variant, offset: 5720, length: 90, content: 言懺摩者，此方正譯：當乞容恕、容忍首＝收【宮】首【大】，收【宮】首收謝義也。若觸誤前人欲乞歡喜者，皆云懺摩，無問大小咸同此說。若悔罪者，本云阿鉢底提舍那。阿鉢底是罪，提舍那是說，應云說罪。云懺悔者懺是西音，悔是東語。不當請恕，復非說罪，誠無由致。, 明: ''}
